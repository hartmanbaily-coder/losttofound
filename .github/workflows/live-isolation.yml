name: Verify Live Isolation

on:
  workflow_dispatch:

jobs:
  verify-isolation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup npm
        run: npm install -g npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Verify two-user isolation against live app
        env:
          RECORDS_APP_BASE_URL: https://losttofound.org
          NEXT_PUBLIC_SUPABASE_URL: https://cieuilbpnwuvnrxrlczj.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RECORDS_EVIDENCE_BUCKET: records-evidence
          RECORDS_ISOLATION_EMAIL_DOMAIN: example.test
          KEEP_ISOLATION_TEST_USERS: "false"
        run: npm run verify:isolation
