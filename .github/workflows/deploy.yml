name: Validate My Custody Case

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: losttofound-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup npm
        run: npm install -g npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Verify app before deploy
        run: |
          npm run lint
          npm run typecheck
          npm run test:unit
          npm run test:deploy
          npm run security:secrets
          npm run security:audit
          npm run verify:env-template
          npm run build
