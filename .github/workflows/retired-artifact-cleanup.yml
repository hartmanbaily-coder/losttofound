name: Cleanup Retired Artifacts

on:
  workflow_dispatch:

jobs:
  delete-retired-grant-bucket:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup npm
        run: npm install -g npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Delete retired grant bucket
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://cieuilbpnwuvnrxrlczj.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DELETE_RETIRED_GRANT_BUCKET_CONFIRM: grant-documents
        run: npm run cleanup:retired-grant-bucket
