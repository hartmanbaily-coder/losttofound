name: losttofound

x-logging: &default-logging
  driver: local
  options:
    max-size: "10m"
    max-file: "5"

services:
  clamav:
    image: clamav/clamav-debian:1.5
    restart: unless-stopped
    environment:
      CLAMAV_NO_MILTERD: "true"
      CLAMD_CONF_MaxFileSize: "25M"
      CLAMD_CONF_StreamMaxLength: "25M"
      FRESHCLAM_CHECKS: "12"
    expose:
      - "3310"
    networks:
      - scanner
      - updates
    volumes:
      - clamav_data:/var/lib/clamav
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 1536m
    cpus: 1.5
    healthcheck:
      test: ["CMD-SHELL", "clamdcheck.sh"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 120s
    logging: *default-logging

  losttofound:
    image: losttofound:${LOSTTOFOUND_IMAGE_TAG:-local}
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:?NEXT_PUBLIC_APP_URL is required}
        NEXT_PUBLIC_RECORDS_HOST: ${NEXT_PUBLIC_RECORDS_HOST:?NEXT_PUBLIC_RECORDS_HOST is required}
        NEXT_PUBLIC_RECORDS_STORAGE_MODE: ${NEXT_PUBLIC_RECORDS_STORAGE_MODE:-supabase}
        NEXT_PUBLIC_RECORDS_SIGNUPS_ENABLED: ${NEXT_PUBLIC_RECORDS_SIGNUPS_ENABLED:-false}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:?NEXT_PUBLIC_SUPABASE_URL is required}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:?NEXT_PUBLIC_SUPABASE_ANON_KEY is required}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    env_file:
      - path: ${LOSTTOFOUND_ENV_FILE:-/srv/losttofound/config/app.env}
        required: true
    depends_on:
      clamav:
        condition: service_healthy
    expose:
      - "3000"
    networks:
      - edge
      - scanner
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /app/.next/cache:size=128m,uid=1001,gid=1001,mode=0750
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 1024m
    cpus: 2.0
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/records || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging: *default-logging

  caddy:
    image: caddy:2.11.4-alpine
    restart: unless-stopped
    depends_on:
      losttofound:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
      - "127.0.0.1:8080:8080"
    networks:
      - edge
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 256m
    cpus: 0.5
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/caddy-health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging: *default-logging

networks:
  edge:
  scanner:
    internal: true
  updates:

volumes:
  clamav_data:
  caddy_data:
  caddy_config:
